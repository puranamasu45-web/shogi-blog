      url: /kifu/
      weight: 4
    - name: About
      url: /about/
      weight: 5

params:
  author: puranamasu45-web
  description: 将棋上達のための棋譜解説・手筋・定跡ブログ
  keywords: [将棋, 棋譜, 藤井聰太, 手筋, 定跡]
  DateFormat: "2006年1月2日"
  ShowReadingTime: true
  ShowShareButtons: true
  ShowToc: true
