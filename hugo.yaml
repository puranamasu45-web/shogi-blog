    - path: github.com/adityatelange/hugo-PaperMod

menu:
  main:
    - name: ホーム
      url: /
      weight: 1
    - name: 記事一覧
      url: /posts/
      weight: 2
    - name: 手筋問題
      url: /tesuji/
      weight: 3
